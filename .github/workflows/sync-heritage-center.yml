name: Heritage Center → CommunityHub Sync

on:
  workflow_dispatch: # manual trigger from dashboard Start button

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Heritage Center sync pipeline
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FALLBACK_EMAIL: ${{ secrets.FALLBACK_EMAIL }}
        run: node sync-heritage-center.js
